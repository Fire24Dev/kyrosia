<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyrosIA - Ultra Stable</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050810; --accent: #00d2ff; --text: #ffffff; --panel: #111827; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { padding: 15px; background: rgba(0,0,0,0.5); border-bottom: 1px solid #222; text-align: center; font-weight: 800; color: var(--accent); letter-spacing: 2px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; }
        .user { align-self: flex-end; background: var(--accent); color: #000; font-weight: 600; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid #222; }
        .ai img { width: 100%; border-radius: 10px; margin-top: 10px; display: block; background: #000; min-height: 200px; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #080c14; border-top: 1px solid #222; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; outline: none; }
        button { padding: 10px 20px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-weight: 800; cursor: pointer; }
        .loader { color: var(--accent); font-size: 0.8rem; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<header>KYROS IA - EVOLUTION</header>
<div id="chat-window"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Scrivi o usa /immagina [testo]...">
    <button onclick="handleSend()">INVIA</button>
</div>

<script>
    // --- CONFIGURAZIONE ---
    const API_KEY = "gsk_9z5OFToTc2DU8boNkRU1anZDUHpHpstO";
    const chatWin = document.getElementById('chat-window');
    const input = document.getElementById('userInput');

    // Funzione per aggiungere messaggi a schermo
    function addMsg(type, content, isHtml = false) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if (isHtml) div.innerHTML = content;
        else div.innerText = content;
        chatWin.appendChild(div);
        chatWin.scrollTop = chatWin.scrollHeight;
        return div;
    }

    async function handleSend() {
        const text = input.value.trim();
        if (!text) return;

        addMsg("user", text);
        input.value = "";

        // --- LOGICA IMMAGINI (/immagina) ---
        if (text.toLowerCase().startsWith("/immagina ")) {
            const prompt = text.replace("/immagina ", "");
            const aiMsg = addMsg("ai", `Generazione di "${prompt}" in corso...`, true);
            
            const seed = Math.floor(Math.random() * 99999);
            const imgUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&nologo=true`;
            
            // Creiamo l'elemento immagine
            const img = new Image();
            img.src = imgUrl;
            img.onload = () => {
                aiMsg.innerHTML = `<b>Risultato:</b><br><img src="${imgUrl}" alt="AI Art">`;
            };
            img.onerror = () => {
                aiMsg.innerText = "Errore nel caricamento dell'immagine.";
            };
            return;
        }

        // --- LOGICA TESTO (Groq) ---
        const aiMsg = addMsg("ai", "...");
        
        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": "Bearer " + API_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: text }]
                })
            });

            const data = await response.json();

            if (data.choices && data.choices[0]) {
                aiMsg.innerText = data.choices[0].message.content;
            } else {
                aiMsg.innerText = "Errore: " + (data.error ? data.error.message : "Risposta non valida.");
            }
        } catch (err) {
            aiMsg.innerText = "Errore di connessione: Verifica la tua connessione o la chiave API.";
            console.error(err);
        }
    }

    // Invio con tasto Enter
    input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleSend(); });

    // Messaggio iniziale
    window.onload = () => {
        addMsg("ai", "Sistemi KyrosIA online. Come posso aiutarti?");
    };
</script>

</body>
</html>
