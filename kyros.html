<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KyrosIA - Evolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050810;
            --panel: rgba(13, 18, 30, 0.75);
            --accent: #00d2ff;
            --text: #ffffff;
            --owner-color: #ff0077;
            --glass-border: rgba(255, 255, 255, 0.08);
            --danger: #ff4b4b;
            --success: #00ff88;
        }

        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(5, 8, 16, 0.8); border-bottom: 1px solid var(--glass-border); z-index: 10; gap: 10px; }
        .status { font-size: 0.7rem; font-weight: 800; color: var(--accent); letter-spacing: 1px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4; animation: emerge 0.3s ease; word-wrap: break-word; position: relative; }
        .msg b { font-weight: 800; color: #fff; }

        .user { align-self: flex-end; background: linear-gradient(135deg, #00d2ff, #3a86ff); color: white; border-bottom-right-radius: 4px; }
        .user.owner-msg { background: linear-gradient(135deg, var(--owner-color), #ff4b2b); box-shadow: 0 5px 15px rgba(255, 0, 119, 0.3); }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid var(--glass-border); border-bottom-left-radius: 4px; padding-bottom: 35px; }

        .ai-img { width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--accent); display: block; }

        .msg-actions { position: absolute; bottom: 5px; right: 10px; display: flex; gap: 8px; opacity: 0.6; transition: 0.3s; }
        .ai:hover .msg-actions { opacity: 1; }
        .action-btn { background: none; border: none; color: white; cursor: pointer; font-size: 0.8rem; padding: 4px; border-radius: 5px; transition: 0.2s; }
        .action-btn:hover { background: rgba(255,255,255,0.1); color: var(--accent); }

        .input-area { padding: 20px; background: var(--bg); display: flex; gap: 10px; border-top: 1px solid var(--glass-border); }
        input { flex: 1; padding: 15px; border-radius: 15px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; outline: none; font-size: 1rem; }
        
        .btn-ui { padding: 8px 12px; border-radius: 10px; border: none; cursor: pointer; font-weight: 800; font-size: 0.7rem; transition: 0.3s; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-logout { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--glass-border); }
        .btn-send { width: 55px; border-radius: 15px; background: var(--accent); font-size: 1.2rem; display: flex; align-items: center; justify-content: center; color: #000; }

        #assist-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .assist-content { max-width: 600px; margin: 40px auto; background: var(--panel); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; }
        
        @keyframes emerge { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 800; letter-spacing: 2px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">KYROS IA</div>
    <div class="status" id="statusLabel">Caricamento...</div>
    <button onclick="toggleAssist()" class="btn-ui btn-accent">ASSISTENZA</button>
    <button onclick="logout()" class="btn-ui btn-logout">LOGOUT</button>
</header>

<div id="chat-window"></div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="Scrivi o usa /immagina..." autocomplete="off">
    <button onclick="handleSend()" class="btn-ui btn-send">➤</button>
</div>

<div id="assist-overlay">
    <div class="assist-content">
        <h2 id="assist-title">Assistenza</h2>
        <div id="assist-body"></div>
        <button onclick="toggleAssist()" class="btn-ui btn-logout" style="width: 100%; margin-top: 20px;">CHIUDI</button>
    </div>
</div>

<script>
    // Configurazione Chiave e Sessione
    const _vault = () => "gsk_9z5OFToTc2DU8boNkRU1anZDUHpHpstO"; 
    
    // Fallback se la sessione è vuota per testare senza login
    const currentNick = sessionStorage.getItem('kyros_session') || "Utente Ospite";
    const userRole = sessionStorage.getItem('kyros_role') || "User"; 

    const statusLabel = document.getElementById('statusLabel');
    const chatWin = document.getElementById('chat-window');
    const input = document.getElementById('userInput');

    let isMaintenance = localStorage.getItem('kyros_maintenance') === 'true';
    let blacklist = JSON.parse(localStorage.getItem('kyros_blacklist')) || [];
    let assistRequests = JSON.parse(localStorage.getItem('kyros_assist')) || [];

    function init() {
        updateStatus();
        addMsg("ai", `Sistema attivo. Benvenuto <b>${currentNick}</b>. Puoi chattare normalmente o usare <b>/immagina</b> per generare immagini.`);
    }

    function updateStatus() {
        let text = (userRole === "Owner" ? "OWNER: " : "UTENTE: ") + currentNick;
        if(isMaintenance) text += " [MANUTENZIONE]";
        statusLabel.innerText = text;
        if(userRole === "Owner") statusLabel.style.color = "var(--owner-color)";
    }

    // --- FUNZIONE IMMAGINI ---
    function generateImage(prompt, msgId) {
        const seed = Math.floor(Math.random() * 1000000);
        const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&nologo=true`;
        
        setTimeout(() => {
            const container = document.getElementById(msgId);
            if(container) {
                container.innerHTML = `<b>Risultato per:</b> <i>${prompt}</i><br><img src="${imageUrl}" class="ai-img" onclick="window.open('${imageUrl}', '_blank')">`;
            }
        }, 500);
    }

    async function handleSend() {
        const text = input.value.trim();
        if (!text) return;

        if (blacklist.includes(currentNick) && userRole !== "Owner") {
            addMsg("ai", "<b>ACCESSO NEGATO:</b> Sei in blacklist.");
            return;
        }

        addMsg("user", text);
        input.value = "";

        // Gestione Comandi /
        if (text.startsWith("/")) {
            const parts = text.split(" ");
            const cmd = parts[0].toLowerCase();
            const arg = parts.slice(1).join(" ");

            if (cmd === "/immagina") {
                if (!arg) return addMsg("ai", "Specifica cosa disegnare. Es: /immagina un drago.");
                const tid = "img-" + Date.now();
                addMsg("ai", "Generazione immagine in corso...", tid);
                generateImage(arg, tid);
                return;
            }

            if (userRole === "Owner") {
                handleAdmin(cmd, arg);
            } else {
                addMsg("ai", "Comando riservato all'amministratore.");
            }
            return;
        }

        if (isMaintenance && userRole !== "Owner") {
            return addMsg("ai", "Sistemi in manutenzione.");
        }

        // Chiamata API Groq
        const tid = "ai-" + Date.now();
        addMsg("ai", "...", tid);

        try {
            const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { 
                    "Authorization": `Bearer ${_vault()}`, 
                    "Content-Type": "application/json" 
                },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [
                        {role: "system", content: "Sei KyrosIA. Rispondi in italiano in modo professionale e audace."},
                        {role: "user", content: text}
                    ]
                })
            });
            const data = await resp.json();
            const aiTxt = data.choices[0].message.content;
            document.getElementById(tid).innerHTML = parseMarkdown(aiTxt);
        } catch (e) {
            document.getElementById(tid).innerText = "Errore di connessione alle API.";
        }
    }

    function handleAdmin(cmd, arg) {
        if(cmd === "/ban") {
            blacklist.push(arg);
            localStorage.setItem('kyros_blacklist', JSON.stringify(blacklist));
            addMsg("ai", `Bannato: ${arg}`);
        } else if(cmd === "/unban") {
            blacklist = blacklist.filter(u => u !== arg);
            localStorage.setItem('kyros_blacklist', JSON.stringify(blacklist));
            addMsg("ai", `Sbloccato: ${arg}`);
        } else if(cmd === "/manutenzione") {
            isMaintenance = !isMaintenance;
            localStorage.setItem('kyros_maintenance', isMaintenance);
            updateStatus();
            addMsg("ai", `Manutenzione: ${isMaintenance}`);
        }
    }

    function parseMarkdown(t) {
        return t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
    }

    function addMsg(type, text, id = "") {
        const div = document.createElement('div');
        const uid = id || "m-" + Math.random().toString(36).substr(2, 7);
        div.className = `msg ${type} ${ (type === 'user' && userRole === 'Owner') ? 'owner-msg' : '' }`;
        div.innerHTML = `<span id="${uid}">${text}</span>`;
        
        if(type === 'ai') {
            div.innerHTML += `<div class="msg-actions">
                <button class="action-btn" onclick="copyText('${uid}')"><i class="fas fa-copy"></i></button>
            </div>`;
        }
        chatWin.appendChild(div);
        chatWin.scrollTop = chatWin.scrollHeight;
    }

    function copyText(id) {
        const t = document.getElementById(id).innerText;
        navigator.clipboard.writeText(t);
    }

    function toggleAssist() {
        const o = document.getElementById('assist-overlay');
        o.style.display = (o.style.display === 'block') ? 'none' : 'block';
    }

    function logout() { sessionStorage.clear(); location.reload(); }
    input.onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
    init();
</script>
</body>
</html>
